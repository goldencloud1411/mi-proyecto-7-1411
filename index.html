<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff1242">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ARMY Schedule">
    <link rel="manifest" href="site.webmanifest">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <title>ARMY Schedule Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        :root {
            --bts-black: #000000;
            --bts-white: #ffffff;
            --bts-red: #ff1242; 
            --bts-gray-light: #f6f6f6;
            --bts-gray-border: #e0e0e0;
            --bts-text-muted: #757575;
            --header-padding: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif;
            font-weight: 500;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            background-color: var(--bts-white);
            color: var(--bts-black);
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }


        .ultra-bold {
            font-family: 'Archivo Black', 'Arial Black', Arial, Helvetica, sans-serif;
            font-weight: 900;
            -webkit-text-stroke: 0.18px transparent;
            text-shadow: 0.28px 0 currentColor, -0.28px 0 currentColor;
        }

        header {
            padding: var(--header-padding);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            border-bottom: 2px solid var(--bts-black);
        }

        .header-left, .header-right {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .header-right { align-items: flex-end; }

        .title-group h1 {
            font-family: 'Anton', Impact, Haettenschweiler, 'Arial Black', Arial, Helvetica, sans-serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 400;
            -webkit-text-stroke: 0.2px transparent;
            text-shadow: 0.35px 0 currentColor, -0.35px 0 currentColor;
            text-transform: uppercase;
            letter-spacing: -1.4px;
            line-height: 0.88;
        }

        .title-group p {
            font-family: 'Archivo Black', 'Arial Black', Arial, Helvetica, sans-serif;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--bts-text-muted);
            font-weight: 700;
            margin-top: 10px;
        }

        .album-container img {
            max-width: 100%;
            width: 240px;
            height: auto;
            border: 1px solid var(--bts-gray-border);
            display: block;
            cursor: pointer;
        }

        .media-block {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            width: fit-content;
            max-width: 100%;
        }

        .album-container {
            width: 100%;
            max-width: 380px;
        }

        .spotify-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin-top: 8px;
            padding: 0 4px;
            width: 100%;
            max-width: 380px;
        }

        .spotify-control-btn,
        .spotify-control-link {
            background: none;
            border: none;
            color: var(--bts-text-muted);
            font-size: 0.68rem;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            padding: 0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .spotify-control-btn:hover,
        .spotify-control-link:hover {
            color: var(--bts-black);
        }


        .media-block.is-player-active .spotify-controls {
            position: relative;
            z-index: 2;
        }


        .clocks-wrapper {
            display: flex;
            gap: 25px;
            margin-bottom: 10px;
        }

        .clock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100px;
        }

        .label-box {
            background-color: var(--bts-red);
            width: 100%;
            text-align: center;
            padding: 3px 0;
            margin-bottom: 4px;
        }

        .label-box span {
            font-family: 'Archivo Black', 'Arial Black', Arial, Helvetica, sans-serif;
            color: white;
            font-weight: 900;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .clock-time {
            font-family: 'Archivo Black', 'Arial Black', Arial, Helvetica, sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
        }

        /* --- ESTILOS DEL CALENDARIO --- */
        .calendar-container {
            width: 220px;
            background: var(--bts-white);
            border: 1px solid var(--bts-black);
            padding: 10px;
            font-size: 0.7rem;
        }

        .calendar-header {
            text-align: center;
            font-family: 'Archivo Black', Impact, Haettenschweiler, 'Arial Black', Arial, Helvetica, sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--bts-gray-border);
            padding-bottom: 5px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            text-align: center;
        }

        .calendar-day-head {
            font-family: 'Archivo Black', Impact, Haettenschweiler, 'Arial Black', Arial, Helvetica, sans-serif;
            font-weight: 900;
            color: var(--bts-text-muted);
            margin-bottom: 5px;
        }

        .calendar-day {
            padding: 4px 0;
            font-weight: 700;
        }

        .has-event {
            background-color: var(--bts-red);
            color: white;
            border-radius: 2px;
            font-weight: 900;
        }

        /* --- TABLA Y EVENTOS --- */
        .main-content {
            padding: 0 var(--header-padding) 40px;
            flex: 1;
        }

        .table-header, .event-row {
            display: grid;
            grid-template-columns: 80px 1fr 160px 80px;
            align-items: center;
            gap: 15px;
        }

        .table-header {
            padding: 15px 0;
            border-bottom: 2px solid var(--bts-black);
            font-family: 'Archivo Black', Impact, Haettenschweiler, 'Arial Black', Arial, Helvetica, sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1px;
            -webkit-text-stroke: 0.14px transparent;
            text-shadow: 0.22px 0 currentColor, -0.22px 0 currentColor;
        }

        .event-row {
            padding: 20px 0;
            border-bottom: 1px solid var(--bts-gray-border);
        }

        .event-row.past-event {
            opacity: 0.5;
            background: #fafafa;
        }

        .past-tag {
            font-size: 0.55rem;
            background: #999;
            color: white;
            padding: 2px 4px;
            font-weight: 900;
            margin-left: 5px;
            vertical-align: middle;
        }

        .date-col { font-family: 'Archivo Black', Impact, Haettenschweiler, 'Arial Black', Arial, Helvetica, sans-serif; font-size: 1.2rem; font-weight: 900; text-align: center; letter-spacing: 0.2px; -webkit-text-stroke: 0.15px transparent; text-shadow: 0.22px 0 currentColor, -0.22px 0 currentColor; }
        .date-col span { display: block; font-size: 0.65rem; color: var(--bts-text-muted); text-transform: uppercase; font-weight: 900; letter-spacing: 0.6px; -webkit-text-stroke: 0.1px transparent; text-shadow: 0.15px 0 currentColor, -0.15px 0 currentColor; }

        .info-col .event-name { font-family: 'Archivo Black', Impact, Haettenschweiler, 'Arial Black', Arial, Helvetica, sans-serif; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; margin-bottom: 4px; line-height: 1.05; letter-spacing: 0.1px; -webkit-text-stroke: 0.16px transparent; text-shadow: 0.24px 0 currentColor, -0.24px 0 currentColor; }
        .info-col button.details-trigger {
            background: none; border: none; font-size: 0.65rem; font-weight: 900; color: var(--bts-red); font-family: 'Archivo Black', Impact, Haettenschweiler, 'Arial Black', Arial, Helvetica, sans-serif; 
            border-bottom: 1px solid var(--bts-red); cursor: pointer; text-transform: uppercase;
            -webkit-text-stroke: 0.1px transparent;
            text-shadow: 0.14px 0 currentColor, -0.14px 0 currentColor;
        }

        .sync-col { display: flex; flex-direction: column; gap: 6px; }
        .time-pill {
            background: var(--bts-gray-light); padding: 4px 8px; display: flex; justify-content: space-between;
            font-weight: 900; font-size: 0.75rem; border-radius: 2px;
        }
        .time-pill .tag { color: var(--bts-red); font-size: 0.6rem; font-weight: 900; font-family: 'Archivo Black', Impact, Haettenschweiler, 'Arial Black', Arial, Helvetica, sans-serif; letter-spacing: 0.4px; -webkit-text-stroke: 0.1px transparent; text-shadow: 0.14px 0 currentColor, -0.14px 0 currentColor; }
        .time-pill span:last-child { font-weight: 900; }

        .action-col { display: flex; gap: 10px; justify-content: flex-end; }
        .action-btn { background: none; border: none; font-size: 1rem; color: #ccc; cursor: pointer; padding: 5px; }
        .edit-btn:hover { color: var(--bts-black); }
        .delete-btn:hover { color: var(--bts-red); }

        /* MODALES */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content { background: white; width: 100%; max-width: 400px; padding: 30px; position: relative; border: 3px solid black; }
        .modal-close { position: absolute; top: 10px; right: 10px; font-size: 1.5rem; cursor: pointer; font-weight: 900; }
        .modal-body h2 { font-family: 'Archivo Black', Impact, Haettenschweiler, 'Arial Black', Arial, Helvetica, sans-serif; font-size: 1.8rem; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; border-bottom: 2px solid var(--bts-red); padding-bottom: 10px; line-height: 1; -webkit-text-stroke: 0.16px transparent; text-shadow: 0.24px 0 currentColor, -0.24px 0 currentColor; }
        
        .detail-item { margin-bottom: 15px; }
        .detail-item label { display: block; font-size: 0.7rem; text-transform: uppercase; font-weight: 900; color: var(--bts-text-muted); font-family: 'Archivo Black', Impact, Haettenschweiler, 'Arial Black', Arial, Helvetica, sans-serif; letter-spacing: 0.5px; -webkit-text-stroke: 0.1px transparent; text-shadow: 0.14px 0 currentColor, -0.14px 0 currentColor; }
        .detail-item p { font-size: 1rem; font-weight: 900; font-family: 'Archivo Black', 'Arial Black', Arial, Helvetica, sans-serif; -webkit-text-stroke: 0.12px transparent; text-shadow: 0.18px 0 currentColor, -0.18px 0 currentColor; }

        /* Contenedor de botones en el modal */
        .modal-footer-actions {
            display: flex; 
            gap: 10px; 
            margin-top: 20px; 
            align-items: stretch; /* Esto asegura que el botón de copiar tenga la misma altura que el link */
        }

        .modal-link-btn { 
            flex: 1;
            padding: 15px; 
            background: black; 
            color: white; 
            text-align: center; 
            text-decoration: none; 
            font-weight: 900; 
            text-transform: uppercase;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-copy-btn {
            width: 50px;
            background: black;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .modal-copy-btn:hover {
            background: var(--bts-red);
        }

        #event-form { display: none; background: var(--bts-gray-light); padding: 20px; border: 2px solid var(--bts-black); margin-top: 10px; }
        .form-grid { display: flex; flex-direction: column; gap: 12px; }
        .form-grid input { padding: 12px; border: 1px solid #ccc; width: 100%; }
        .save-btn { background: var(--bts-black); color: white; padding: 15px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .cancel-btn { background: #eee; color: #666; padding: 10px; border: none; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }

        .table-header > div {
            font-family: 'Archivo Black', Impact, Haettenschweiler, 'Arial Black', Arial, Helvetica, sans-serif;
            font-weight: 900;
            -webkit-text-stroke: 0.14px transparent;
            text-shadow: 0.22px 0 currentColor, -0.22px 0 currentColor;
        }

        .label-box span,
        .clock-time,
        .calendar-header,
        .calendar-day-head,
        .has-event,
        .past-tag,
        .modal-link-btn,
        .save-btn,
        .add-btn {
            font-family: 'Archivo Black', Impact, Haettenschweiler, 'Arial Black', Arial, Helvetica, sans-serif;
            font-weight: 900;
        }

        .footer-controls { padding: 20px 0; display: flex; justify-content: center; }
        .add-btn { background: var(--bts-black); color: white; border: none; padding: 14px 30px; font-weight: 900; text-transform: uppercase; cursor: pointer; width: 100%; max-width: 300px; }

        @media (max-width: 768px) {
            :root {
                --header-padding: 14px;
            }

            header {
                display: grid;
                grid-template-columns: minmax(0, 1fr) minmax(140px, 42%);
                align-items: start;
                gap: 14px;
            }

            .header-left, .header-right {
                min-width: 0;
                gap: 12px;
            }

            .header-right {
                align-items: stretch;
            }

            .title-group h1 {
                font-size: clamp(2.2rem, 8vw, 3.2rem);
                line-height: 0.95;
            }

            .title-group p {
                font-size: 0.58rem;
                letter-spacing: 2px;
                margin-top: 6px;
            }

            .media-block {
                width: 100%;
                max-width: 260px;
                gap: 6px;
            }

            .album-container {
                max-width: 260px;
            }

            .album-container img {
                width: 100%;
                max-width: 260px;
            }

            .spotify-controls {
                width: 100%;
                max-width: 260px;
                padding: 0;
                gap: 8px;
                margin-top: 0;
            }

            .spotify-control-btn,
            .spotify-control-link {
                font-size: 0.58rem;
                gap: 4px;
            }


            .media-block.is-player-active .spotify-controls {
                margin-top: -72px;
            }

            .clocks-wrapper {
                justify-content: space-between;
                gap: 10px;
                width: 100%;
                margin-bottom: 0;
            }

            .clock-item {
                width: calc(50% - 5px);
            }

            .clock-time {
                font-size: clamp(1rem, 3.6vw, 1.35rem);
            }

            .calendar-container {
                width: 100%;
                max-width: 250px;
                margin-left: auto;
                font-size: 0.72rem;
            }

            .main-content {
                padding: 0 var(--header-padding) 28px;
            }

            .table-header, .event-row {
                grid-template-columns: 72px minmax(0, 1fr) 132px 58px;
                gap: 10px;
            }

            .table-header {
                font-size: 0.68rem;
            }

            .event-row {
                padding: 16px 0;
            }

            .date-col {
                font-size: 1rem;
            }

            .date-col span {
                font-size: 0.62rem;
            }

            .info-col .event-name {
                font-size: 0.92rem;
                line-height: 1.15;
                word-break: break-word;
            }

            .sync-col {
                gap: 4px;
            }

            .time-pill {
                padding: 4px 6px;
                font-size: 0.68rem;
            }

            .action-col {
                gap: 4px;
            }
        }

        @media (max-width: 500px) {
            header {
                grid-template-columns: minmax(0, 1fr) 150px;
                gap: 12px;
            }

            .title-group h1 {
                font-size: clamp(1.9rem, 9vw, 2.8rem);
            }

            .title-group p {
                font-size: 0.52rem;
                letter-spacing: 1.8px;
            }

            .clocks-wrapper {
                gap: 8px;
            }

            .clock-item {
                width: calc(50% - 4px);
            }

            .label-box span {
                font-size: 0.62rem;
            }

            .clock-time {
                font-size: 0.95rem;
            }


            .media-block.is-player-active .spotify-controls {
                margin-top: -64px;
            }

            .calendar-container {
                padding: 8px;
                font-size: 0.64rem;
            }

            .calendar-day {
                padding: 3px 0;
            }

            .table-header {
                display: grid;
                grid-template-columns: 52px minmax(0, 1fr) 112px 30px;
                gap: 8px;
                font-size: 0.56rem;
                letter-spacing: 0.7px;
                padding: 12px 0;
            }

            .event-row {
                grid-template-columns: 52px minmax(0, 1fr) 112px 30px;
                gap: 8px;
                align-items: start;
                padding: 14px 0;
            }

            .date-col {
                font-size: 0.9rem;
                line-height: 1;
            }

            .date-col span {
                font-size: 0.58rem;
                margin-bottom: 4px;
            }

            .info-col .event-name {
                font-size: 0.82rem;
                line-height: 1.1;
                margin-bottom: 6px;
            }

            .info-col button.details-trigger {
                font-size: 0.58rem;
            }

            .past-tag {
                font-size: 0.48rem;
                padding: 2px 3px;
                margin-left: 4px;
            }

            .sync-col {
                gap: 6px;
            }

            .time-pill {
                padding: 2px 0;
                font-size: 0.58rem;
                background: transparent;
                justify-content: space-between;
            }

            .time-pill .tag {
                font-size: 0.58rem;
            }

            .action-col {
                flex-direction: column;
                align-items: flex-end;
                gap: 2px;
                padding-top: 2px;
            }

            .action-btn {
                font-size: 0.82rem;
                padding: 1px;
            }
        }

        @media (max-width: 390px) {
            header {
                grid-template-columns: 1fr;
            }

            .header-right {
                align-items: stretch;
            }

            .calendar-container {
                max-width: none;
                margin-left: 0;
            }

            .media-block,
            .spotify-controls,
            .album-container {
                max-width: none;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="title-group">
                <h1>Schedule</h1>
                <p>BTS Official Event Tracker</p>
            </div>
            <div class="media-block">
                <div class="album-container">
                    <img src="arirang album.png" alt="Arirang Album">
                </div>
                <div id="spotify-controls" class="spotify-controls"></div>
            </div>
        </div>

        <div class="header-right">
            <div class="clocks-wrapper">
                <div class="clock-item">
                    <div class="label-box"><span>Peru</span></div>
                    <div id="pe-time" class="clock-time">--:--:--</div>
                </div>
                <div class="clock-item">
                    <div class="label-box"><span>Korea</span></div>
                    <div id="kr-time" class="clock-time">--:--:--</div>
                </div>
            </div>
            
            <div id="calendar-widget" class="calendar-container">
                <div id="cal-month" class="calendar-header">Cargando...</div>
                <div class="calendar-grid">
                    <div class="calendar-day-head">D</div>
                    <div class="calendar-day-head">L</div>
                    <div class="calendar-day-head">M</div>
                    <div class="calendar-day-head">X</div>
                    <div class="calendar-day-head">J</div>
                    <div class="calendar-day-head">V</div>
                    <div class="calendar-day-head">S</div>
                </div>
                <div id="cal-days" class="calendar-grid"></div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="table-header">
            <div>Fecha</div>
            <div>Evento</div>
            <div>Horario</div>
            <div style="text-align: right;">Acción</div>
        </div>

        <div id="events-list"></div>

        <div class="footer-controls">
            <button id="btn-toggle-form" class="add-btn">+ Nuevo Evento</button>
        </div>

        <div id="event-form">
            <div class="form-grid">
                <h3 id="form-title" style="text-transform: uppercase; font-size: 0.8rem; margin-bottom: 5px;">Nuevo Evento</h3>
                <input type="hidden" id="edit-id">
                <input type="text" id="in-title" placeholder="Nombre del Evento">
                <input type="datetime-local" id="in-date">
                <input type="url" id="in-link" placeholder="Link del Evento (opcional)">
                <button id="btn-save" class="save-btn">Guardar Evento</button>
                <button id="btn-cancel" class="cancel-btn">Cancelar</button>
            </div>
        </div>
    </main>

    <div id="details-modal" class="modal">
        <div class="modal-content">
            <span id="modal-close" class="modal-close">×</span>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
