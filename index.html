<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="icon.png">
    <title>ARMY Schedule Pro</title>
    <style>
        :root {
            --bts-black: #000000;
            --bts-white: #ffffff;
            --bts-red: #ff1242; 
            --bts-gray-light: #f6f6f6;
            --bts-gray-border: #e0e0e0;
            --bts-text-muted: #757575;
            --header-padding: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bts-white);
            color: var(--bts-black);
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Ajuste de contenedores para la posición de los bloques */
        header {
            padding: var(--header-padding);
            display: flex;
            flex-direction: column; /* Apilado en móvil */
            gap: 20px;
            border-bottom: 1px solid var(--bts-gray-border);
        }

        @media (min-width: 600px) {
            header {
                flex-direction: row; /* Uno al lado del otro en desktop */
                justify-content: space-between;
                align-items: flex-start;
            }
        }

        /* Bloque 1: Schedule & Spotify */
        .block-1 {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Bloque 2: Relojes & Calendario */
        .block-2 {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 350px;
        }

        /* Estilos originales del ZIP */
        .brand-header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 0.8;
            text-transform: uppercase;
        }

        .brand-header p {
            font-size: 0.7rem;
            color: var(--bts-red);
            font-weight: 800;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .album-container {
            width: 100%;
            max-width: 300px;
            margin-top: 5px;
        }

        .album-art {
            width: 100%;
            aspect-ratio: 1/1;
            background-color: #eee;
            cursor: pointer;
            border-radius: 4px;
            overflow: hidden;
            display: block;
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .spotify-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .spotify-btn {
            flex: 1;
            padding: 8px;
            font-size: 0.65rem;
            font-weight: bold;
            text-transform: uppercase;
            border: 1px solid var(--bts-black);
            background: white;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            color: black;
        }

        .clocks-container {
            display: flex;
            gap: 10px;
        }

        .clock-item {
            flex: 1;
            background: var(--bts-gray-light);
            padding: 12px;
            border-radius: 4px;
            text-align: center;
        }

        .clock-label {
            font-size: 0.6rem;
            font-weight: bold;
            color: var(--bts-text-muted);
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .clock-time {
            font-size: 1.3rem;
            font-weight: 800;
        }

        .mini-calendar {
            border: 1px solid var(--bts-gray-border);
            border-radius: 4px;
            padding: 15px;
        }

        .calendar-title {
            font-size: 0.8rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }

        .day-header {
            font-size: 0.6rem;
            font-weight: bold;
            color: var(--bts-text-muted);
        }

        .day-cell {
            font-size: 0.75rem;
            padding: 6px 0;
        }

        .day-cell.today {
            background: var(--bts-black);
            color: white;
            border-radius: 2px;
        }

        /* Main Content original */
        .main-content { padding: 20px; }

        .table-header {
            display: grid;
            grid-template-columns: 80px 1fr 100px 60px;
            padding: 10px 0;
            border-bottom: 2px solid var(--bts-black);
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .event-item {
            display: grid;
            grid-template-columns: 80px 1fr 100px 60px;
            padding: 15px 0;
            border-bottom: 1px solid var(--bts-gray-border);
            font-size: 0.85rem;
            align-items: center;
        }

        #event-form {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: white;
            padding: 20px;
            border: 1px solid black;
            display: none;
            z-index: 100;
        }

        .add-btn {
            background: black;
            color: white;
            padding: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 25px;
            width: 90%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <header>
        <!-- Bloque 1: Schedule e Imagen/Reproductor -->
        <div class="block-1">
            <div class="brand-header">
                <h1>Schedule</h1>
                <p>BTS OFFICIAL EVENT TRACKER</p>
            </div>

            <div class="album-container">
                <div id="spotify-player-root">
                    <div class="album-art" id="album-btn">
                        <img src="arirang album.png" alt="Arirang Album" onerror="this.src='https://i.scdn.co/image/ab67616d0000b2737609756184d09355442f4c28'">
                    </div>
                </div>
                
                <div class="spotify-controls">
                    <button class="spotify-btn" id="btn-change-playlist">Cambiar Playlist</button>
                    <a href="#" class="spotify-btn" id="btn-open-app">Abrir App</a>
                </div>
            </div>
        </div>

        <!-- Bloque 2: Relojes y Calendario -->
        <div class="block-2">
            <div class="clocks-container">
                <div class="clock-item">
                    <div class="clock-label">Perú</div>
                    <div id="pe-time" class="clock-time">00:00:00</div>
                </div>
                <div class="clock-item">
                    <div class="clock-label">Korea</div>
                    <div id="kr-time" class="clock-time">00:00:00</div>
                </div>
            </div>

            <div class="mini-calendar">
                <div class="calendar-title" id="cal-month-title">MARZO 2024</div>
                <div class="calendar-grid">
                    <div class="day-header">L</div><div class="day-header">M</div><div class="day-header">M</div>
                    <div class="day-header">J</div><div class="day-header">V</div><div class="day-header">S</div><div class="day-header">D</div>
                </div>
                <div id="cal-days" class="calendar-grid">
                    <!-- Los días se generan mediante script.js -->
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="table-header">
            <div>Fecha</div>
            <div>Evento</div>
            <div>Horario</div>
            <div style="text-align: right;">Ver</div>
        </div>

        <div id="events-list">
            <!-- Los eventos se generan mediante script.js -->
        </div>

        <button id="btn-toggle-form" class="add-btn">+ Nuevo Evento</button>

        <div id="event-form">
            <input type="hidden" id="edit-id">
            <input type="text" id="in-title" placeholder="Nombre del Evento" style="width:100%; margin-bottom:10px; padding:10px; border:1px solid #ddd;">
            <input type="datetime-local" id="in-date" style="width:100%; margin-bottom:10px; padding:10px; border:1px solid #ddd;">
            <input type="url" id="in-link" placeholder="Link del Evento (opcional)" style="width:100%; margin-bottom:10px; padding:10px; border:1px solid #ddd;">
            <button id="btn-save" style="width:100%; background:black; color:white; padding:12px; border:none; font-weight:bold; cursor:pointer;">GUARDAR</button>
            <button id="btn-cancel" style="width:100%; background:none; border:none; padding:10px; cursor:pointer;">Cancelar</button>
        </div>
    </main>

    <div id="details-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-bottom:10px; text-transform: uppercase;"></h2>
            <p id="modal-date" style="color:var(--bts-text-muted); margin-bottom:20px;"></p>
            <div id="modal-actions"></div>
            <button id="modal-close" style="margin-top:20px; width:100%; padding:10px; background:#f0f0f0; border:none; font-weight:bold; cursor:pointer;">Cerrar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
