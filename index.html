<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="icon.png">
    <title>ARMY Schedule Pro</title>
    <style>
        :root {
            --bts-black: #000000;
            --bts-white: #ffffff;
            --bts-red: #ff1242; 
            --bts-gray-light: #f6f6f6;
            --bts-gray-border: #e0e0e0;
            --bts-text-muted: #757575;
            --header-padding: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bts-white);
            color: var(--bts-black);
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* AJUSTE DE CABECERA PARA MÓVIL */
        header {
            padding: var(--header-padding);
            display: flex;
            flex-wrap: wrap; /* Permite que los elementos bajen si no caben */
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            border-bottom: 1px solid var(--bts-gray-border);
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1 1 200px; /* Base de 200px, puede crecer */
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-top img {
            height: 30px;
            width: auto;
        }

        .album-container {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .album-container:hover {
            transform: scale(1.05);
        }

        .album-container img {
            height: 40px;
            width: 40px;
            border-radius: 4px;
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .clocks-container {
            display: flex;
            justify-content: space-around;
            background: var(--bts-gray-light);
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            color: var(--bts-black);
            border: 1px solid var(--bts-gray-border);
        }

        .clock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .clock-label {
            font-size: 0.65rem;
            color: var(--bts-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .header-right {
            flex: 1 1 180px; /* Base de 180px para el calendario */
            max-width: 250px;
        }

        /* CALENDARIO */
        .calendar-wrapper {
            background: var(--bts-white);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            text-align: center;
        }

        .calendar-day-head {
            font-weight: bold;
            font-size: 0.65rem;
            color: var(--bts-text-muted);
            padding-bottom: 4px;
        }

        .cal-day {
            padding: 5px 0;
            font-size: 0.75rem;
            position: relative;
            background: var(--bts-gray-light);
            border-radius: 2px;
        }

        .cal-day.today {
            background: var(--bts-black);
            color: var(--bts-white);
            font-weight: bold;
        }

        .cal-day .dot {
            height: 3px;
            width: 3px;
            background-color: var(--bts-red);
            border-radius: 50%;
            display: inline-block;
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* CONTENIDO PRINCIPAL */
        .main-content {
            padding: 20px;
            flex-grow: 1;
        }

        .table-header {
            display: grid;
            grid-template-columns: 80px 1fr 80px 60px;
            gap: 10px;
            font-weight: bold;
            color: var(--bts-text-muted);
            font-size: 0.75rem;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--bts-black);
            text-transform: uppercase;
        }

        #events-list {
            margin-bottom: 100px;
        }

        .event-row {
            display: grid;
            grid-template-columns: 80px 1fr 80px 60px;
            gap: 10px;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--bts-gray-border);
            font-size: 0.9rem;
        }

        .event-row:hover {
            background-color: #fafafa;
        }

        /* BOTONES Y FORMULARIOS */
        .footer-controls {
            padding: 15px 20px;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--bts-white);
            border-top: 1px solid var(--bts-gray-border);
            z-index: 10;
        }

        .add-btn {
            width: 100%;
            padding: 14px;
            background: var(--bts-black);
            color: var(--bts-white);
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.2s;
        }

        #event-form {
            display: none;
            background: var(--bts-white);
            padding: 20px;
            border-top: 2px solid var(--bts-black);
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 20;
        }

        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 500px;
            margin: 0 auto;
        }

        input {
            padding: 12px;
            border: 1px solid var(--bts-gray-border);
            border-radius: 6px;
            font-size: 1rem;
            width: 100%;
        }

        .save-btn {
            background: var(--bts-black);
            color: var(--bts-white);
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .cancel-btn {
            background: var(--bts-gray-light);
            color: var(--bts-black);
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: var(--bts-white);
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            border: none;
            background: none;
        }

        /* MEDIA QUERIES PARA TABLA EN MÓVIL */
        @media (max-width: 400px) {
            .table-header, .event-row {
                grid-template-columns: 60px 1fr 65px 40px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="header-top">
                <img src="arirang logo.png" alt="Arirang Logo">
                <div class="album-container">
                    <img src="arirang album.png" alt="Album Art">
                </div>
            </div>

            <div class="clocks-container">
                <div class="clock-item">
                    <span class="clock-label">PE 🇵🇪</span>
                    <span id="pe-time">00:00:00</span>
                </div>
                <div class="clock-item">
                    <span class="clock-label">KR 🇰🇷</span>
                    <span id="kr-time">00:00:00</span>
                </div>
            </div>
        </div>

        <div class="header-right">
            <div class="calendar-wrapper">
                <div class="calendar-grid">
                    <div class="calendar-day-head">D</div><div class="calendar-day-head">L</div><div class="calendar-day-head">M</div><div class="calendar-day-head">M</div><div class="calendar-day-head">J</div><div class="calendar-day-head">V</div><div class="calendar-day-head">S</div>
                </div>
                <div id="cal-days" class="calendar-grid"></div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="table-header">
            <div>Fecha</div>
            <div>Evento</div>
            <div>Horario</div>
            <div style="text-align: right;">Acción</div>
        </div>

        <div id="events-list"></div>

        <div class="footer-controls">
            <button id="btn-toggle-form" class="add-btn">+ Nuevo Evento</button>
        </div>

        <div id="event-form">
            <div class="form-grid">
                <h3 id="form-title" style="text-transform: uppercase; font-size: 0.8rem; margin-bottom: 5px;">Nuevo Evento</h3>
                <input type="hidden" id="edit-id">
                <input type="text" id="in-title" placeholder="Nombre del Evento">
                <input type="datetime-local" id="in-date">
                <input type="url" id="in-link" placeholder="Link del Evento (opcional)">
                <button id="btn-save" class="save-btn">Guardar Evento</button>
                <button id="btn-cancel" class="cancel-btn">Cancelar</button>
            </div>
        </div>
    </main>

    <div id="details-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal" id="modal-close">&times;</button>
            <div id="modal-body">
                <!-- Se llena vía JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
