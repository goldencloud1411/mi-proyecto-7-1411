<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="icon.png">
    <title>ARMY Schedule Pro</title>
    <style>
        :root {
            --bts-black: #000000;
            --bts-white: #ffffff;
            --bts-red: #ff1242; 
            --bts-gray-light: #f6f6f6;
            --bts-gray-border: #e0e0e0;
            --bts-text-muted: #757575;
            --header-padding: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bts-white);
            color: var(--bts-black);
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: var(--header-padding);
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            border-bottom: 1px solid var(--bts-gray-border);
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1.2;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-top img {
            height: 35px;
            width: auto;
        }

        .album-container {
            cursor: pointer;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .album-container img {
            height: 45px;
            width: 45px;
            border-radius: 4px;
            object-fit: cover;
        }

        .clocks-container {
            display: flex;
            justify-content: space-around;
            background: var(--bts-gray-light);
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--bts-black);
            border: 1px solid var(--bts-gray-border);
        }

        .clock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .clock-label {
            font-size: 0.7rem;
            color: var(--bts-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .header-right {
            flex: 1;
            min-width: 160px;
        }

        .calendar-wrapper {
            background: var(--bts-white);
            width: 100%;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            text-align: center;
        }

        .calendar-day-head {
            font-weight: bold;
            font-size: 0.7rem;
            color: var(--bts-text-muted);
            padding-bottom: 4px;
        }

        .cal-day {
            padding: 6px 0;
            font-size: 0.8rem;
            position: relative;
            background: var(--bts-gray-light);
            border-radius: 3px;
        }

        .cal-day.today {
            background: var(--bts-black);
            color: var(--bts-white);
            font-weight: bold;
        }

        .cal-day .dot {
            height: 3px;
            width: 3px;
            background-color: var(--bts-red);
            border-radius: 50%;
            display: inline-block;
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
        }

        main.main-content {
            padding: 20px;
            flex-grow: 1;
        }

        .table-header {
            display: grid;
            grid-template-columns: 80px 1fr 80px 40px;
            gap: 10px;
            font-weight: bold;
            color: var(--bts-text-muted);
            font-size: 0.75rem;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--bts-black);
            text-transform: uppercase;
        }

        #events-list {
            margin-bottom: 100px;
        }

        .event-row {
            display: grid;
            grid-template-columns: 80px 1fr 80px 40px;
            gap: 10px;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--bts-gray-border);
            font-size: 0.9rem;
        }

        .event-actions {
            display: flex;
            justify-content: flex-end;
        }

        .action-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 5px;
            font-size: 1.1rem;
        }

        .footer-controls {
            padding: 15px 20px;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--bts-white);
            border-top: 1px solid var(--bts-gray-border);
            z-index: 10;
        }

        .add-btn {
            width: 100%;
            padding: 14px;
            background: var(--bts-black);
            color: var(--bts-white);
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #event-form {
            display: none;
            background: var(--bts-white);
            padding: 20px;
            border-top: 2px solid var(--bts-black);
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 20;
        }

        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 500px;
            margin: 0 auto;
        }

        input {
            padding: 12px;
            border: 1px solid var(--bts-gray-border);
            border-radius: 6px;
            font-size: 1rem;
            width: 100%;
        }

        .save-btn {
            background: var(--bts-black);
            color: var(--bts-white);
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .cancel-btn {
            background: var(--bts-gray-light);
            color: var(--bts-black);
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: var(--bts-white);
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 1.8rem;
            cursor: pointer;
            border: none; background: none;
        }

        /* RESPONSIVE AJUSTES */
        @media (max-width: 480px) {
            header {
                padding: 15px;
                gap: 10px;
            }
            .header-left { flex: 1.5; }
            .header-right { flex: 1; min-width: 120px; }
            
            .clocks-container { font-size: 0.9rem; padding: 8px; }
            .cal-day { font-size: 0.7rem; padding: 4px 0; }
            .calendar-day-head { font-size: 0.6rem; }

            .table-header { grid-template-columns: 60px 1fr 65px 30px; }
            .event-row { grid-template-columns: 60px 1fr 65px 30px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="header-top">
                <img src="arirang logo.png" alt="Logo" onerror="this.style.display='none'">
                <div class="album-container" title="Cambiar Spotify">
                    <img src="arirang album.png" alt="Album" onerror="this.style.display='none'">
                </div>
            </div>

            <div class="clocks-container">
                <div class="clock-item">
                    <span class="clock-label">PE 🇵🇪</span>
                    <span id="pe-time">--:--</span>
                </div>
                <div class="clock-item">
                    <span class="clock-label">KR 🇰🇷</span>
                    <span id="kr-time">--:--</span>
                </div>
            </div>
        </div>

        <div class="header-right">
            <div class="calendar-wrapper">
                <div class="calendar-grid">
                    <div class="calendar-day-head">D</div><div class="calendar-day-head">L</div><div class="calendar-day-head">M</div><div class="calendar-day-head">M</div><div class="calendar-day-head">J</div><div class="calendar-day-head">V</div><div class="calendar-day-head">S</div>
                </div>
                <div id="cal-days" class="calendar-grid"></div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="table-header">
            <div>Fecha</div>
            <div>Evento</div>
            <div>Hora</div>
            <div style="text-align: right;"></div>
        </div>

        <div id="events-list"></div>
    </main>

    <div class="footer-controls">
        <button id="btn-toggle-form" class="add-btn">+ NUEVO EVENTO</button>
    </div>

    <div id="event-form">
        <div class="form-grid">
            <h3 id="form-title" style="font-size: 0.9rem; text-transform: uppercase;">Evento</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="in-title" placeholder="Nombre del Evento">
            <input type="datetime-local" id="in-date">
            <input type="url" id="in-link" placeholder="Link (opcional)">
            <button id="btn-save" class="save-btn">GUARDAR</button>
            <button id="btn-cancel" class="cancel-btn">CANCELAR</button>
        </div>
    </div>

    <div id="details-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal" id="modal-close">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        (function() {
            const STORAGE_KEY = 'bts_pro_events_v2';
            const SPOTIFY_URL_KEY = 'bts_pro_spotify_v2';
            let events = [];

            const loadData = () => {
                const data = localStorage.getItem(STORAGE_KEY);
                events = data ? JSON.parse(data) : [];
            };

            const saveData = () => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
                renderAll();
            };

            const updateClocks = () => {
                const now = new Date();
                const pe = now.toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'America/Lima' });
                const kr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Seoul' });
                document.getElementById('pe-time').textContent = pe;
                document.getElementById('kr-time').textContent = kr;
            };

            const renderCalendar = () => {
                const calDays = document.getElementById('cal-days');
                calDays.innerHTML = '';
                const now = new Date();
                const year = now.getFullYear();
                const month = now.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                for (let i = 0; i < firstDay; i++) calDays.innerHTML += '<div></div>';

                for (let i = 1; i <= daysInMonth; i++) {
                    const hasEvent = events.some(ev => {
                        const d = new Date(ev.date);
                        return d.getDate() === i && d.getMonth() === month && d.getFullYear() === year;
                    });
                    const isToday = (i === now.getDate() && month === now.getMonth() && year === now.getFullYear()) ? 'today' : '';
                    calDays.innerHTML += `<div class="cal-day ${isToday}">${i}${hasEvent ? '<span class="dot"></span>' : ''}</div>`;
                }
            };

            const renderEvents = () => {
                const list = document.getElementById('events-list');
                list.innerHTML = '';
                events.sort((a, b) => new Date(a.date) - new Date(b.date));

                events.forEach((ev, idx) => {
                    const d = new Date(ev.date);
                    const day = d.toLocaleDateString('es-PE', { day: '2-digit', month: '2-digit' });
                    const time = d.toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit', hour12: false });
                    
                    const row = document.createElement('div');
                    row.className = 'event-row';
                    row.innerHTML = `
                        <div>${day}</div>
                        <div style="font-weight:500; cursor:pointer;" onclick="viewEvent(${idx})">${ev.title}</div>
                        <div>${time}</div>
                        <div class="event-actions">
                            <button class="action-btn" onclick="editEvent(${idx})">✏️</button>
                        </div>
                    `;
                    list.appendChild(row);
                });
            };

            const renderAll = () => {
                renderEvents();
                renderCalendar();
            };

            const setupSpotify = () => {
                const container = document.querySelector('.album-container');
                const spotifyUrl = localStorage.getItem(SPOTIFY_URL_KEY);
                
                if (spotifyUrl) {
                    const player = document.createElement('div');
                    player.innerHTML = `<iframe style="border-radius:8px; margin-top:10px" src="${spotifyUrl}" width="100%" height="80" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>`;
                    document.querySelector('.header-left').appendChild(player);
                }

                container.onclick = () => {
                    const current = localStorage.getItem(SPOTIFY_URL_KEY) || "";
                    const newUrl = prompt("Pega el link de Embed de Spotify:", current);
                    if (newUrl !== null) {
                        localStorage.setItem(SPOTIFY_URL_KEY, newUrl);
                        location.reload();
                    }
                };
            };

            window.viewEvent = (idx) => {
                const ev = events[idx];
                const d = new Date(ev.date).toLocaleString('es-PE', { dateStyle: 'long', timeStyle: 'short' });
                document.getElementById('modal-body').innerHTML = `
                    <h2 style="margin-bottom:10px">${ev.title}</h2>
                    <p style="color:#666; margin-bottom:20px">${d}</p>
                    ${ev.link ? `<a href="${ev.link}" target="_blank" class="save-btn" style="display:block; text-align:center; text-decoration:none">Abrir Enlace</a>` : ''}
                    <button class="cancel-btn" style="width:100%; margin-top:10px" onclick="deleteEvent(${idx})">Eliminar Evento</button>
                `;
                document.getElementById('details-modal').style.display = 'flex';
            };

            window.editEvent = (idx) => {
                const ev = events[idx];
                document.getElementById('edit-id').value = idx;
                document.getElementById('in-title').value = ev.title;
                document.getElementById('in-date').value = ev.date;
                document.getElementById('in-link').value = ev.link || '';
                document.getElementById('event-form').style.display = 'block';
            };

            window.deleteEvent = (idx) => {
                if(confirm("¿Eliminar?")) {
                    events.splice(idx, 1);
                    saveData();
                    document.getElementById('details-modal').style.display = 'none';
                }
            };

            document.getElementById('btn-toggle-form').onclick = () => {
                document.getElementById('edit-id').value = '';
                document.getElementById('in-title').value = '';
                document.getElementById('in-date').value = '';
                document.getElementById('in-link').value = '';
                document.getElementById('event-form').style.display = 'block';
            };

            document.getElementById('btn-cancel').onclick = () => document.getElementById('event-form').style.display = 'none';

            document.getElementById('btn-save').onclick = () => {
                const id = document.getElementById('edit-id').value;
                const title = document.getElementById('in-title').value;
                const date = document.getElementById('in-date').value;
                const link = document.getElementById('in-link').value;
                if (!title || !date) return;
                
                if (id !== "") events[id] = { title, date, link };
                else events.push({ title, date, link });
                
                saveData();
                document.getElementById('event-form').style.display = 'none';
            };

            document.getElementById('modal-close').onclick = () => document.getElementById('details-modal').style.display = 'none';

            window.onload = () => {
                loadData();
                updateClocks();
                renderAll();
                setupSpotify();
                setInterval(updateClocks, 1000);
            };
        })();
    </script>
</body>
</html>
