<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="icon.png">
    <title>ARMY Schedule Pro</title>
    <style>
        :root {
            --bts-black: #000000;
            --bts-white: #ffffff;
            --bts-red: #ff1242; 
            --bts-gray-light: #f6f6f6;
            --bts-gray-border: #e0e0e0;
            --bts-text-muted: #757575;
            --header-padding: 15px; /* Ajustado para móviles */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bts-white);
            color: var(--bts-black);
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- HEADER ADAPTADO PARA MÓVIL --- */
        header {
            padding: var(--header-padding);
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-bottom: 1px solid var(--bts-gray-border);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 10px;
        }

        .logo-container img {
            height: 32px; /* Un poco más pequeño para que entre el reproductor */
            width: auto;
            object-fit: contain;
        }

        /* Reproductor de Álbum */
        .album-player {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f9f9f9;
            padding: 4px 10px;
            border-radius: 50px;
            border: 1px solid #eee;
            cursor: pointer;
            max-width: 60%; /* Evita que empuje al logo */
        }

        .album-art {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            object-fit: cover;
        }

        .album-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .album-title {
            font-size: 0.65rem;
            font-weight: bold;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .album-status {
            font-size: 0.55rem;
            color: var(--bts-red);
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Relojes con Banderas */
        .clocks-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            width: 100%;
        }

        .clock-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1rem;
        }

        .flag {
            width: 18px;
            height: 12px;
            object-fit: cover;
            border-radius: 1px;
        }

        /* Calendario - Asegurando que cuadre al 100% */
        .calendar-section {
            width: 100%;
            background: var(--bts-gray-light);
            border-radius: 12px;
            padding: 12px;
        }

        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            text-align: center;
        }

        .cal-day-name {
            font-size: 0.6rem;
            color: var(--bts-text-muted);
            padding-bottom: 5px;
            font-weight: bold;
        }

        .cal-day {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 4px;
        }

        .cal-day.today { background: var(--bts-red); color: white; font-weight: bold; }
        .cal-day.has-event { border-bottom: 2px solid var(--bts-red); }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-content {
            flex: 1;
            padding: 15px;
        }

        .table-header {
            display: grid;
            grid-template-columns: 60px 1fr 65px 45px;
            padding: 8px 0;
            border-bottom: 2px solid var(--bts-black);
            font-weight: bold;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .event-row {
            display: grid;
            grid-template-columns: 60px 1fr 65px 45px;
            padding: 10px 0;
            border-bottom: 1px solid var(--bts-gray-border);
            align-items: center;
            font-size: 0.8rem;
        }

        .add-btn {
            background: var(--bts-black);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        /* Modales y Formularios */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 350px;
        }

        #event-form {
            display: none;
            background: #fff;
            padding: 15px;
            border: 1px solid #ddd;
            margin-top: 10px;
            border-radius: 8px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .save-btn { background: #000; color: #fff; border: none; padding: 12px; width: 100%; border-radius: 6px; }
        .cancel-btn { background: #eee; border: none; padding: 12px; width: 100%; margin-top: 5px; border-radius: 6px; }

    </style>
</head>
<body>

    <header>
        <!-- Logo y Reproductor en una fila que no se rompe -->
        <div class="header-top">
            <div class="logo-container">
                <img src="arirang logo.png" alt="Arirang Logo">
            </div>
            
            <div class="album-player album-container">
                <img src="arirang album.png" alt="Album Art" class="album-art">
                <div class="album-info">
                    <span class="album-title">Arirang Radio</span>
                    <span class="album-status">On Air</span>
                </div>
            </div>
        </div>

        <!-- Relojes centrados -->
        <div class="clocks-container">
            <div class="clock-item">
                <img src="https://flagcdn.com/w40/pe.png" class="flag" alt="PE">
                <span id="pe-time">00:00:00</span>
            </div>
            <div class="clock-item">
                <img src="https://flagcdn.com/w40/kr.png" class="flag" alt="KR">
                <span id="kr-time">00:00:00</span>
            </div>
        </div>

        <!-- Calendario que ocupa todo el ancho -->
        <div class="calendar-section">
            <div class="cal-header">
                <span id="cal-month">Marzo 2024</span>
                <div style="display: flex; gap: 15px;">
                    <span id="prev-month" style="cursor:pointer; padding: 5px;">❮</span>
                    <span id="next-month" style="cursor:pointer; padding: 5px;">❯</span>
                </div>
            </div>
            <div class="calendar-grid">
                <div class="cal-day-name">D</div>
                <div class="cal-day-name">L</div>
                <div class="cal-day-name">M</div>
                <div class="cal-day-name">M</div>
                <div class="cal-day-name">J</div>
                <div class="cal-day-name">V</div>
                <div class="cal-day-name">S</div>
            </div>
            <div id="cal-days" class="calendar-grid"></div>
        </div>
    </header>

    <main class="main-content">
        <div class="table-header">
            <div>Fecha</div>
            <div>Evento</div>
            <div>Hora</div>
            <div style="text-align: right;">Acción</div>
        </div>

        <div id="events-list">
            <!-- Eventos generados por script.js -->
        </div>

        <button id="btn-toggle-form" class="add-btn">+ NUEVO EVENTO</button>

        <div id="event-form">
            <input type="hidden" id="edit-id">
            <input type="text" id="in-title" placeholder="Nombre del Evento">
            <input type="datetime-local" id="in-date">
            <input type="url" id="in-link" placeholder="URL opcional">
            <button id="btn-save" class="save-btn">Guardar</button>
            <button id="btn-cancel" class="cancel-btn">Cerrar</button>
        </div>
    </main>

    <div id="details-modal" class="modal">
        <div class="modal-content">
            <div id="modal-body"></div>
            <button id="modal-close" class="cancel-btn">Cerrar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
