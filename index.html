<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="icon.png">
    <title>ARMY Schedule Pro</title>
    <style>
        :root {
            --bts-black: #000000;
            --bts-white: #ffffff;
            --bts-red: #ff1242; 
            --bts-gray-light: #f6f6f6;
            --bts-gray-border: #e0e0e0;
            --bts-text-muted: #757575;
            --header-padding: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bts-white);
            color: var(--bts-black);
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: var(--header-padding);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            border-bottom: 1px solid var(--bts-gray-border);
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
            min-width: 200px;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-top img {
            height: 40px;
        }

        .album-container {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .album-container:hover {
            transform: scale(1.05);
        }

        .album-container img {
            height: 50px;
            border-radius: 4px;
        }

        .clocks-container {
            display: flex;
            justify-content: space-between;
            background: var(--bts-gray-light);
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--bts-black);
            border: 1px solid var(--bts-gray-border);
        }

        .clock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .clock-label {
            font-size: 0.75rem;
            color: var(--bts-text-muted);
            text-transform: uppercase;
        }

        .header-right {
            flex: 1;
            min-width: 250px;
        }

        .calendar-wrapper {
            background: var(--bts-white);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            text-align: center;
        }

        .calendar-day-head {
            font-weight: bold;
            font-size: 0.8rem;
            color: var(--bts-text-muted);
            padding-bottom: 5px;
        }

        .cal-day {
            padding: 8px 0;
            font-size: 0.9rem;
            position: relative;
            background: var(--bts-gray-light);
            border-radius: 4px;
        }

        .cal-day.today {
            background: var(--bts-black);
            color: var(--bts-white);
            font-weight: bold;
        }

        .cal-day .dot {
            height: 4px;
            width: 4px;
            background-color: var(--bts-red);
            border-radius: 50%;
            display: inline-block;
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
        }

        main.main-content {
            padding: 20px;
            flex-grow: 1;
        }

        .table-header {
            display: grid;
            grid-template-columns: 90px 1fr 80px 100px;
            gap: 10px;
            font-weight: bold;
            color: var(--bts-text-muted);
            font-size: 0.85rem;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--bts-black);
            text-transform: uppercase;
        }

        #events-list {
            margin-bottom: 80px;
        }

        .event-row {
            display: grid;
            grid-template-columns: 90px 1fr 80px 100px;
            gap: 10px;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--bts-gray-border);
            font-size: 0.95rem;
        }

        .event-actions {
            display: flex;
            gap: 5px;
            justify-content: flex-end;
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--bts-gray-border);
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 4px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
        }

        .action-btn:hover { background: var(--bts-gray-light); }

        .footer-controls {
            padding: 20px;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--bts-white);
            border-top: 1px solid var(--bts-gray-border);
            z-index: 10;
        }

        .add-btn {
            width: 100%;
            padding: 15px;
            background: var(--bts-black);
            color: var(--bts-white);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        #event-form {
            display: none;
            background: var(--bts-gray-light);
            padding: 20px;
            border-radius: 6px;
            margin-top: 20px;
            border: 1px solid var(--bts-gray-border);
            position: fixed;
            bottom: 85px;
            left: 20px;
            right: 20px;
            z-index: 20;
        }

        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            padding: 12px;
            border: 1px solid var(--bts-gray-border);
            border-radius: 4px;
            font-size: 0.95rem;
        }

        .save-btn {
            background: var(--bts-black);
            color: var(--bts-white);
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .cancel-btn {
            background: var(--bts-white);
            color: var(--bts-black);
            padding: 10px;
            border: 1px solid var(--bts-gray-border);
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--bts-white);
            padding: 30px;
            border-radius: 6px;
            width: 90%;
            max-width: 400px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            border: none; background: none;
        }

        /* AJUSTES PARA CELULAR (MÓVIL) */
        @media (max-width: 600px) {
            header {
                padding: 15px;
                flex-direction: column;
                gap: 20px;
            }

            .header-left, .header-right {
                width: 100%;
                min-width: unset;
            }

            .header-top {
                justify-content: center;
            }

            .clocks-container {
                padding: 10px;
                font-size: 1rem;
            }

            /* Tabla compacta para móvil */
            .table-header {
                display: none;
            }

            .event-row {
                grid-template-columns: 60px 1fr 65px;
                gap: 5px;
                font-size: 0.85rem;
            }

            .event-actions {
                grid-column: 1 / -1;
                justify-content: flex-start;
                margin-top: 5px;
                border-top: 1px solid #f0f0f0;
                padding-top: 5px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="header-top">
                <img src="arirang logo.png" alt="Arirang Logo" onerror="this.style.display='none'">
                <div class="album-container">
                    <img src="arirang album.png" alt="Arirang Album" onerror="this.style.display='none'">
                </div>
            </div>

            <div class="clocks-container">
                <div class="clock-item">
                    <span class="clock-label">Perú 🇵🇪</span>
                    <span id="pe-time">--:--:--</span>
                </div>
                <div class="clock-item">
                    <span class="clock-label">Corea 🇰🇷</span>
                    <span id="kr-time">--:--:--</span>
                </div>
            </div>
        </div>

        <div class="header-right">
            <div class="calendar-wrapper">
                <div class="calendar-grid">
                    <div class="calendar-day-head">D</div>
                    <div class="calendar-day-head">L</div>
                    <div class="calendar-day-head">M</div>
                    <div class="calendar-day-head">M</div>
                    <div class="calendar-day-head">J</div>
                    <div class="calendar-day-head">V</div>
                    <div class="calendar-day-head">S</div>
                </div>
                <div id="cal-days" class="calendar-grid"></div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="table-header">
            <div>Fecha</div>
            <div>Evento</div>
            <div>Horario</div>
            <div style="text-align: right;">Acción</div>
        </div>

        <div id="events-list"></div>

        <div id="event-form">
            <div class="form-grid">
                <h3 id="form-title" style="text-transform: uppercase; font-size: 0.8rem; margin-bottom: 5px;">Nuevo Evento</h3>
                <input type="hidden" id="edit-id">
                <input type="text" id="in-title" placeholder="Nombre del Evento">
                <input type="datetime-local" id="in-date">
                <input type="url" id="in-link" placeholder="Link del Evento (opcional)">
                <button id="btn-save" class="save-btn">Guardar Evento</button>
                <button id="btn-cancel" class="cancel-btn">Cancelar</button>
            </div>
        </div>
    </main>

    <div class="footer-controls">
        <button id="btn-toggle-form" class="add-btn">+ Nuevo Evento</button>
    </div>

    <div id="details-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal" id="modal-close">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        (function() {
            const STORAGE_KEY = 'bts_pro_events';
            const SPOTIFY_URL_KEY = 'bts_pro_spotify';
            let events = [];

            const loadData = () => {
                try {
                    const data = localStorage.getItem(STORAGE_KEY);
                    events = data ? JSON.parse(data) : [];
                } catch (e) { events = []; }
            };

            const saveData = () => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
                renderEvents();
                renderCalendar();
            };

            const updateClocks = () => {
                const now = new Date();
                const pe = now.toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false, timeZone: 'America/Lima' });
                const kr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false, timeZone: 'Asia/Seoul' });
                document.getElementById('pe-time').textContent = pe;
                document.getElementById('kr-time').textContent = kr;
            };

            const renderCalendar = () => {
                const calDays = document.getElementById('cal-days');
                calDays.innerHTML = '';
                const now = new Date();
                const year = now.getFullYear();
                const month = now.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                for (let i = 0; i < firstDay; i++) calDays.innerHTML += '<div></div>';

                for (let i = 1; i <= daysInMonth; i++) {
                    const hasEvent = events.some(ev => {
                        const d = new Date(ev.date);
                        return d.getDate() === i && d.getMonth() === month && d.getFullYear() === year;
                    });
                    const isToday = (i === now.getDate() && month === now.getMonth() && year === now.getFullYear()) ? 'today' : '';
                    calDays.innerHTML += `<div class="cal-day ${isToday}">${i}${hasEvent ? '<span class="dot"></span>' : ''}</div>`;
                }
            };

            const renderEvents = () => {
                const list = document.getElementById('events-list');
                list.innerHTML = '';
                events.sort((a, b) => new Date(a.date) - new Date(b.date));

                events.forEach((ev, idx) => {
                    const d = new Date(ev.date);
                    const dayStr = d.toLocaleDateString('es-PE', { day: '2-digit', month: '2-digit' });
                    const timeStr = d.toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit', hour12: false });
                    
                    const row = document.createElement('div');
                    row.className = 'event-row';
                    row.innerHTML = `
                        <div>${dayStr}</div>
                        <div style="font-weight:500">${ev.title}</div>
                        <div>${timeStr} Hrs</div>
                        <div class="event-actions">
                            <button class="action-btn" onclick="viewEvent(${idx})">👁️</button>
                            <button class="action-btn" onclick="editEvent(${idx})">✏️</button>
                            <button class="action-btn" onclick="deleteEvent(${idx})">🗑️</button>
                        </div>
                    `;
                    list.appendChild(row);
                });
            };

            const setupSpotify = () => {
                const container = document.querySelector('.album-container');
                const spotifyUrl = localStorage.getItem(SPOTIFY_URL_KEY);
                
                if (spotifyUrl) {
                    const player = document.createElement('div');
                    player.id = 'spotify-player-frame';
                    player.style.marginTop = "10px";
                    player.innerHTML = `<iframe style="border-radius:12px" src="${spotifyUrl}" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>`;
                    document.querySelector('.header-left').appendChild(player);
                }

                container.onclick = () => {
                    const current = localStorage.getItem(SPOTIFY_URL_KEY) || "";
                    const newUrl = prompt("Configura tu link de Spotify (Embed URL):", current);
                    if (newUrl !== null) {
                        localStorage.setItem(SPOTIFY_URL_KEY, newUrl);
                        location.reload();
                    }
                };
            };

            window.viewEvent = (idx) => {
                const ev = events[idx];
                const d = new Date(ev.date).toLocaleString('es-PE', { dateStyle: 'full', timeStyle: 'short' });
                const modal = document.getElementById('details-modal');
                document.getElementById('modal-body').innerHTML = `
                    <h2 style="margin-bottom:10px">${ev.title}</h2>
                    <p><strong>Fecha:</strong> ${d}</p>
                    ${ev.link ? `<div style="margin-top:15px; display:flex; gap:10px;">
                        <a href="${ev.link}" target="_blank" class="save-btn" style="flex:1; text-align:center; text-decoration:none;">Abrir Link</a>
                        <button class="action-btn" onclick="copyToClipboard('${ev.link}', this)">📋</button>
                    </div>` : ''}
                `;
                modal.style.display = 'flex';
            };

            window.copyToClipboard = (text, btn) => {
                const temp = document.createElement('input');
                temp.value = text;
                document.body.appendChild(temp);
                temp.select();
                document.execCommand('copy');
                document.body.removeChild(temp);
                const original = btn.innerText;
                btn.innerText = '✅';
                setTimeout(() => btn.innerText = original, 2000);
            };

            window.editEvent = (idx) => {
                const ev = events[idx];
                document.getElementById('edit-id').value = idx;
                document.getElementById('in-title').value = ev.title;
                document.getElementById('in-date').value = ev.date;
                document.getElementById('in-link').value = ev.link || '';
                document.getElementById('form-title').textContent = "Editar Evento";
                document.getElementById('event-form').style.display = 'block';
            };

            window.deleteEvent = (idx) => {
                if(confirm("¿Eliminar este evento?")) {
                    events.splice(idx, 1);
                    saveData();
                }
            };

            document.getElementById('btn-toggle-form').onclick = () => {
                const f = document.getElementById('event-form');
                if (f.style.display === 'block') {
                    f.style.display = 'none';
                } else {
                    document.getElementById('edit-id').value = '';
                    document.getElementById('in-title').value = '';
                    document.getElementById('in-date').value = '';
                    document.getElementById('in-link').value = '';
                    document.getElementById('form-title').textContent = "Nuevo Evento";
                    f.style.display = 'block';
                }
            };

            document.getElementById('btn-cancel').onclick = () => document.getElementById('event-form').style.display = 'none';

            document.getElementById('btn-save').onclick = () => {
                const id = document.getElementById('edit-id').value;
                const title = document.getElementById('in-title').value;
                const date = document.getElementById('in-date').value;
                const link = document.getElementById('in-link').value;
                if (!title || !date) return alert("Completa los campos");
                
                if (id !== "") events[id] = { title, date, link };
                else events.push({ title, date, link });
                
                saveData();
                document.getElementById('event-form').style.display = 'none';
            };

            document.getElementById('modal-close').onclick = () => document.getElementById('details-modal').style.display = 'none';

            window.onload = () => {
                loadData();
                updateClocks();
                renderCalendar();
                renderEvents();
                setupSpotify();
                setInterval(updateClocks, 1000);
            };
        })();
    </script>
</body>
</html>
