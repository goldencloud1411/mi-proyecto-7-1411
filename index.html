<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="icon.png">
    <title>ARMY Schedule Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bts-black: #000000;
            --bts-white: #ffffff;
            --bts-red: #ff1242; 
            --bts-gray-light: #f6f6f6;
            --bts-gray-border: #e0e0e0;
            --bts-text-muted: #757575;
            --header-padding: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bts-white);
            color: var(--bts-black);
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: var(--header-padding);
            border-bottom: 2px solid var(--bts-black);
            position: relative;
            background: white;
            z-index: 10;
        }

        .title-group h1 {
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
        }

        .title-group p {
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--bts-text-muted);
            font-weight: 600;
            margin-top: 6px;
        }

        .album-container img {
            margin-top: 15px;
            width: 170px;
            height: auto;
            border: 1px solid var(--bts-gray-border);
            display: block;
        }

        .clocks {
            display: flex;
            gap: 15px;
            position: absolute;
            top: var(--header-padding);
            right: var(--header-padding);
            align-items: center;
        }

        .clock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 65px;
        }

        .label-box {
            background-color: var(--bts-red);
            width: 100%;
            text-align: center;
            padding: 2px 0;
            margin-bottom: 2px;
        }

        .label-box span {
            color: white;
            font-weight: 900;
            font-size: 0.6rem;
            text-transform: uppercase;
        }

        .clock-time {
            font-size: 0.85rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }

        .calendar {
            width: 140px;
            background: var(--bts-white);
            border: 1px solid var(--bts-black);
            padding: 5px;
            font-size: 0.6rem;
            position: absolute;
            top: 65px; /* Just below clocks */
            right: var(--header-padding);
        }

        .calendar-header {
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 5px;
            border-bottom: 1px solid var(--bts-gray-border);
            padding-bottom: 2px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            text-align: center;
        }

        .calendar-day-head {
            font-weight: 900;
            color: var(--bts-text-muted);
            margin-bottom: 3px;
        }

        .calendar-day {
            padding: 1px 0;
            font-weight: 600;
        }

        .has-event {
            background-color: var(--bts-red);
            color: white;
            border-radius: 2px;
            font-weight: 900;
        }

        /* Cuerpo principal */
        main {
            padding: 0 var(--header-padding) 40px;
            flex: 1;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            color: var(--bts-text-muted);
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .controls span { display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .controls a { text-decoration: none; color: inherit; display: flex; align-items: center; gap: 4px; }

        .spotify-iframe-container iframe {
            margin-top: 10px;
        }

        /* Tabla de eventos */
        .table-header, .event-row {
            display: grid;
            grid-template-columns: 35px 1fr 65px 40px; /* adapted columns for sidepanel */
            gap: 8px;
            align-items: center;
        }

        .table-header {
            padding: 12px 0;
            border-bottom: 1.5px solid var(--bts-black);
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.65rem;
        }

        .event-row {
            padding: 10px 0;
            border-bottom: 1px solid var(--bts-gray-light);
        }

        .date-col { font-size: 0.8rem; font-weight: 900; text-align: center; }
        .date-col span { display: block; font-size: 0.5rem; color: var(--bts-text-muted); text-transform: uppercase; }

        .info-col .event-name { font-size: 0.75rem; font-weight: 900; text-transform: uppercase; margin-bottom: 2px; }
        
        .details-trigger {
            background: none;
            border: none;
            font-size: 0.6rem;
            font-weight: 900;
            color: var(--bts-red); 
            border-bottom: 1px solid var(--bts-red);
            cursor: pointer;
            text-transform: uppercase;
            padding: 0;
        }

        .sync-col { display: flex; flex-direction: column; gap: 2px; }
        
        .time-pill {
            background: var(--bts-gray-light);
            padding: 2px 4px;
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 0.6rem;
            border-radius: 2px;
        }

        .time-pill .tag { color: var(--bts-red); font-size: 0.55rem; font-weight: 900; margin-right: 4px; }

        .action-col { text-align: right; }

        /* Formulario Nuevo Evento */
        #event-form {
            display: none;
            background: var(--bts-gray-light);
            padding: 10px;
            border: 1.5px solid var(--bts-black);
            margin-top: 10px;
        }

        .form-grid { display: flex; flex-direction: column; gap: 8px; }
        .form-grid input { padding: 8px; border: 1px solid #ccc; }
        
        .save-btn { background: var(--bts-black); color: white; padding: 10px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .cancel-btn { background: #eee; color: #666; padding: 8px; border: none; cursor: pointer; text-transform: uppercase; font-size: 0.65rem; }

        .footer-controls {
            padding: 10px 0;
            display: flex;
            justify-content: center;
        }

        .add-btn {
            background: var(--bts-black);
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 0.7rem;
        }

        /* -------------------------------------------------------------------------- */
        /* --- MOBILE FIX (Solo para celulares) --- */
        /* -------------------------------------------------------------------------- */
        @media (max-width: 480px) {
            header {
                /* Cambiamos el diseño de la cabecera para apilar verticalmente */
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
                padding-bottom: 15px; /* Más espacio abajo */
            }

            .title-group h1 { font-size: 1.8rem; } /* Achicamos un poco el título */
            
            .album-container img { margin-top: 5px; } /* Menos margen arriba de la foto */

            /* Quitamos el posicionamiento absoluto de los relojes y el calendario */
            .clocks, .calendar {
                position: static;
                width: auto;
                right: auto;
                top: auto;
                margin-top: 5px; /* Margen para separarlos */
            }

            /* Los relojes uno al lado del otro, alineados a la izquierda */
            .clocks { margin-left: 0; }
            
            /* El calendario un poco más angosto para que no empuje todo */
            .calendar {
                width: 130px; 
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="title-group">
            <h1>Schedule</h1>
            <p>BTS Official Event Tracker</p>
        </div>
        <div class="album-container">
            <img src="arirang album.png" alt="Arirang Album">
        </div>
        <div class="clocks">
            <div class="clock-item">
                <div class="label-box"><span>Peru</span></div>
                <div id="pe-time" class="clock-time">--:--:--</div>
            </div>
            <div class="clock-item">
                <div class="label-box"><span>Korea</span></div>
                <div id="kr-time" class="clock-time">--:--:--</div>
            </div>
        </div>
        <div class="calendar">
            <div id="cal-month" class="calendar-header">Cargando...</div>
            <div class="calendar-grid">
                <div class="calendar-day-head">D</div><div class="calendar-day-head">L</div><div class="calendar-day-head">M</div><div class="calendar-day-head">X</div><div class="calendar-day-head">J</div><div class="calendar-day-head">V</div><div class="calendar-day-head">S</div>
            </div>
            <div id="cal-days" class="calendar-grid"></div>
        </div>
    </header>

    <main>
        <div class="controls">
            <span id="change-playlist">⚙️ Cambiar Playlist</span>
            <a href="#" target="_blank">🔗 Abrir App</a>
        </div>
        
        <div class="spotify-iframe-container"></div>

        <div class="table-header">
            <div>Fecha</div><div>Evento</div><div>Horas</div><div>Acción</div>
        </div>

        <div id="events-list"></div>

        <div class="footer-controls">
            <button id="btn-toggle-form" class="add-btn">+ Nuevo Evento</button>
        </div>

        <div id="event-form">
            <div class="form-grid">
                <input type="text" id="in-title" placeholder="Evento">
                <input type="datetime-local" id="in-date">
                <button id="btn-save" class="save-btn">Guardar</button>
                <button id="btn-cancel" class="cancel-btn">Cancelar</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // Registrar Service Worker para PWA (actualizado a v3 para forzar cambio)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js?v=3')
                .then(() => console.log("App lista para instalar"))
                .catch(err => console.log("Error SW", err));
        }
    </script>
</body>
</html>
