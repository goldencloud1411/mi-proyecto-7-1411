<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="icon.png">
    <title>ARMY Schedule Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bts-black: #000000;
            --bts-white: #ffffff;
            --bts-red: #ff1242; 
            --bts-gray-light: #f6f6f6;
            --bts-gray-border: #e0e0e0;
            --header-padding: 15px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bts-white);
            color: var(--bts-black);
            width: 100%;
            height: 100vh; /* Ocupa exactamente el alto de la pantalla */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Evita scrolls raros */
        }

        header {
            padding: var(--header-padding);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--bts-gray-border);
            background: white;
            z-index: 10;
        }

        .album-container img {
            width: 60px; /* Logo más pequeño para celular */
            height: auto;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .clocks {
            text-align: right;
            line-height: 1.2;
        }

        .clock-row { font-size: 0.75rem; font-weight: bold; }
        .clock-row span { color: var(--bts-red); }

        /* Ajuste del Mini Calendario */
        .mini-calendar {
            background: var(--bts-gray-light);
            padding: 5px;
            border-radius: 6px;
            min-width: 80px;
            text-align: center;
        }

        #cal-month { font-size: 0.6rem; text-transform: uppercase; font-weight: 900; }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            margin-top: 2px;
        }
        .calendar-grid div { font-size: 0.5rem; padding: 1px; }
        .today { background: var(--bts-red); color: white; border-radius: 2px; }

        /* Cuerpo principal */
        main {
            flex: 1;
            overflow-y: auto; /* Solo el contenido tiene scroll */
            padding-bottom: 20px;
        }

        .table-header {
            display: grid;
            grid-template-columns: 60px 1fr 80px 50px;
            padding: 10px 15px;
            font-size: 0.7rem;
            font-weight: bold;
            border-bottom: 1px solid var(--bts-gray-border);
            text-transform: uppercase;
        }

        /* Estilo para los eventos */
        .event-item {
            display: grid;
            grid-template-columns: 60px 1fr 80px 50px;
            padding: 12px 15px;
            border-bottom: 1px solid var(--bts-gray-light);
            align-items: center;
            font-size: 0.85rem;
        }

        .footer-controls {
            padding: 15px;
            background: white;
            border-top: 1px solid var(--bts-gray-border);
        }

        .add-btn {
            width: 100%;
            padding: 12px;
            background: var(--bts-black);
            color: white;
            border: none;
            font-weight: bold;
            border-radius: 4px;
        }

        /* Modal y Formulario */
        #event-form {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            padding: 20px;
            border-top: 2px solid var(--bts-red);
            display: none;
            z-index: 100;
        }

        @media (max-width: 380px) {
            .clocks { display: none; } /* Oculta relojes si el cel es muy pequeño */
        }
    </style>
</head>
<body>
    <header>
        <div class="album-container">
            <img src="arirang logo.png" alt="Arirang Logo">
        </div>
        <div class="header-right">
            <div class="clocks">
                <div class="clock-row">PE: <span id="pe-time">00:00</span></div>
                <div class="clock-row">KR: <span id="kr-time">00:00</span></div>
            </div>
            <div class="mini-calendar">
                <div id="cal-month">---</div>
                <div id="cal-days" class="calendar-grid"></div>
            </div>
        </div>
    </header>

    <main>
        <div class="table-header">
            <div>Fecha</div>
            <div>Evento</div>
            <div>Horas</div>
            <div style="text-align: right;">Acción</div>
        </div>
        <div id="events-list"></div>
    </main>

    <div class="footer-controls">
        <button id="btn-toggle-form" class="add-btn">+ Nuevo Evento</button>
    </div>

    <div id="event-form">
        <input type="text" id="in-title" placeholder="Evento" style="width:100%; margin-bottom:10px; padding:8px;">
        <input type="datetime-local" id="in-date" style="width:100%; margin-bottom:10px; padding:8px;">
        <button id="btn-save" class="add-btn">Guardar</button>
        <button id="btn-cancel" style="width:100%; background:none; border:none; margin-top:10px;">Cancelar</button>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js?v=2');
        }
    </script>
</body>
</html>
